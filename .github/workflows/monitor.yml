name: monitor

on:
  schedule:
    # Every 5 minutes (UTC). GitHub may delay scheduled runs under load.
    - cron: "*/5 * * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system fonts (CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest

  draft-review:
    name: scheduled draft review
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      # --- Hard-coded safe defaults for scheduled observation runs. ---
      # READY notification: never from draft mode.
      # Discord / LINE dispatch: never from this job.
      # Broker / live / paper / order execution: never wired here.
      DRY_RUN: "true"
      AI_USE_MOCK: "false"

      # Reviewers run only when the corresponding secret is configured.
      OPENAI_ENABLED: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
      ANTHROPIC_ENABLED: ${{ secrets.ANTHROPIC_API_KEY != '' && 'true' || 'false' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Market data feed for draft mode.
      FX_MONITOR_FEED: "yahoo"
      FX_MONITOR_SYMBOL: "EURUSD=X"
      FX_MONITOR_TIMEFRAME: "M5"
      FX_MONITOR_MAX_CANDLES: "300"

      # Draft AI review (observation only — never notifies).
      FX_MONITOR_REVIEW_DRAFT_WITH_AI: "true"
      FX_MONITOR_REVIEW_LOG_PATH: "out/review_log.jsonl"
      FX_MONITOR_DIAGNOSTICS_PATH: "out/diagnostics.json"

      # Notification cards are not relevant for draft mode.
      FX_MONITOR_RENDER_CARD: "false"
      FX_MONITOR_ATTACH_CARD: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Install system fonts (CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,market,api,chart,notify]"

      - name: Run draft review once
        # ``run_once`` in feed mode never produces READY by construction
        # (rule_engine draft guard + Decision SUPPRESSED). The reviewers
        # self-gate on OPENAI_ENABLED / ANTHROPIC_ENABLED so a missing
        # key just yields UNKNOWN instead of failing the job.
        run: |
          mkdir -p out
          python -m fx_monitor.app.run_once

      - name: Generate draft review report
        if: always()
        run: |
          mkdir -p out
          python -m fx_monitor.app.review_report \
            --log out/review_log.jsonl \
            --md out/review_report.md \
            --json out/review_report.json

      - name: Upload draft review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-review-${{ github.run_id }}
          path: |
            out/review_log.jsonl
            out/review_report.md
            out/review_report.json
            out/diagnostics.json
          if-no-files-found: warn
          retention-days: 14
