name: monitor

on:
  schedule:
    # Every 5 minutes (UTC). GitHub may delay scheduled runs under load.
    - cron: "*/5 * * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest

  dry-run:
    name: monitor dry-run
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DRY_RUN: "true"
      AI_USE_MOCK: "true"
      NOTIFY_BACKEND: console
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run once (dry-run, mocked AI)
        run: python -m fx_monitor.app.run_once
